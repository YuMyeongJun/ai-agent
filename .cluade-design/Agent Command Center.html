<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Agent Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Pretendard via cdn */
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  :root {
    /* Warm paper palette */
    --bg: #f4efe6;
    --bg-soft: #ede6d7;
    --paper: #fbf7ef;
    --ink: #2b2620;
    --ink-soft: #56504a;
    --ink-faint: #8a827a;
    --line: #e2d9c6;
    --line-soft: #ece4d2;

    /* Accents - shared chroma 0.08 ish, varied hue */
    --sage:    oklch(0.68 0.07 145);  /* main agent */
    --sage-bg: oklch(0.94 0.03 145);
    --terra:   oklch(0.65 0.10 45);   /* CEO / accents */
    --terra-bg:oklch(0.94 0.04 50);
    --plum:    oklch(0.58 0.08 320);  /* music */
    --plum-bg: oklch(0.94 0.03 320);
    --sand:    oklch(0.65 0.09 75);   /* legal */
    --sand-bg: oklch(0.94 0.04 80);
    --moss:    oklch(0.60 0.08 165);  /* score */
    --moss-bg: oklch(0.94 0.03 165);
    --rose:    oklch(0.62 0.10 15);   /* sns */
    --rose-bg: oklch(0.94 0.04 20);

    --shadow-sm: 0 1px 2px rgba(60, 50, 35, 0.05), 0 1px 3px rgba(60, 50, 35, 0.04);
    --shadow-md: 0 2px 6px rgba(60, 50, 35, 0.06), 0 8px 20px rgba(60, 50, 35, 0.05);
    --shadow-lg: 0 4px 14px rgba(60, 50, 35, 0.08), 0 16px 40px rgba(60, 50, 35, 0.07);

    --radius-sm: 8px;
    --radius:    14px;
    --radius-lg: 20px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-feature-settings: "ss01", "ss03", "tnum";
    -webkit-font-smoothing: antialiased;
  }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .serif { font-family: 'Fraunces', Georgia, serif; }

  /* Grid texture - very subtle */
  .canvas-grid {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(60,50,35,0.06) 1px, transparent 0);
    background-size: 28px 28px;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
